server:
  port: 8080
spring:
  application:
    name: gateway-server
  cloud:
    nacos:
      discovery:
        server-addr: http://127.0.0.1:8848
        namespace: 6ed7d1da-d7db-4007-b4cb-6fe448c775e4
        password: qwerdf
    gateway:
      discovery:
        locator:
          enabled: false
      weightcalculator:
        enabled: false
      default-filters:
        - StripPrefix=0
      routes:
        # 国内管理端: /china/admin/** -> playlet-internal-server
        - id: china-admin-route
          uri: lb://playlet-internal-server
          predicates:
            - Path=/china/admin/**
          filters:
            - StripPrefix=2

        # 海外管理端: /global/admin/** -> playlet-oversea-server
        - id: global-admin-route
          uri: lb://playlet-oversea-server
          predicates:
            - Path=/global/admin/**
          filters:
            - StripPrefix=2

        # ToC用户端: /api/** -> 由 playlet.gateway.route-mode 决定国内外
        - id: api-route
          uri: lb://playlet-internal-server
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

# 路由模式: 1=固定国内(推荐本地/联调), 2=固定海外, 3=按客户端IP走 ip-api.com 判国内外
playlet:
  gateway:
    route-mode: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
